<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule a Strategy Call | Koios Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Adamina&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #060d13;
    color: #e8edf2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
    background: linear-gradient(135deg, #0f2230 0%, rgba(10,58,80,0.15) 100%);
    border: 1px solid #1a3a50;
    border-radius: 16px;
    padding: 48px 36px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -60%; left: -60%;
    width: 220%; height: 220%;
    background: radial-gradient(circle at 50% 50%, rgba(26,138,181,0.06) 0%, transparent 60%);
  }
  .logo {
    font-family: 'Adamina', serif;
    font-size: 18px;
    color: #8a9fb5;
    margin-bottom: 28px;
    position: relative;
  }
  h1 {
    font-family: 'Adamina', serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: 12px;
    position: relative;
  }
  h1 em { font-style: italic; color: #1a8ab5; }
  p {
    color: #8a9fb5;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 32px;
    position: relative;
  }
  .features {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    position: relative;
    flex-wrap: wrap;
  }
  .feature {
    font-size: 13px;
    color: #5a7a92;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .feature svg { color: #22d3a7; flex-shrink: 0; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 40px;
    background: #0A3A50;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 4px 20px rgba(10,58,80,0.5);
    position: relative;
  }
  .btn:hover {
    background: #0d4d6a;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(10,58,80,0.7);
  }
  .note {
    font-size: 12px;
    color: #5a7a92;
    margin-top: 20px;
    position: relative;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Koios Analytics</div>
  <h1>Let's Discuss Your <em>AI Strategy</em></h1>
  <p>Book a complimentary 30-minute strategy call to explore how AI can create measurable value for your organisation.</p>
  <div class="features">
    <div class="feature">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      30 min
    </div>
    <div class="feature">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      No obligation
    </div>
    <div class="feature">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Virtual
    </div>
  </div>
  <a href="https://calendar.app.google/gARU96EmoueEsaTv6" class="btn">
    Open Calendar &amp; Book
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
  <div class="note">You'll be redirected to Google Calendar to select a time slot.</div>
</div>
</body>
</html>
